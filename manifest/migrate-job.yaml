apiVersion: batch/v1
kind: Job
metadata:
  name: erpulse-migrate
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 120
  template:
    spec:
      containers:
        - name: migrate
          image: 236510207573.dkr.ecr.ap-northeast-2.amazonaws.com/erpulse-api:latest
          command: ["alembic", "upgrade", "head"]
          envFrom:
            - configMapRef: { name: erpulse-api-config }
            - secretRef: { name: erpulse-api-secret }
      restartPolicy: Never
