apiVersion: v1
kind: Secret
metadata:
  name: erpulse-api-secret
type: Opaque
stringData:
  DATABASE_URL: "postgresql+asyncpg://<user>:<password>@<rds-endpoint>:5432/erpulse"
  REDIS_URL: "redis://<redis-endpoint>:6379"
  PUBLIC_API_KEY: "<public-data-api-key>"

# kubectl create secret generic erpulse-api-secret `
#   --from-literal=DATABASE_URL="postgresql+asyncpg://erpulse:<실제비번>@<rds-endpoint>:5432/erpulse" `
#   --from-literal=REDIS_URL="redis://<redis-endpoint>:6379" `
#   --from-literal=PUBLIC_API_KEY="<실제키>"